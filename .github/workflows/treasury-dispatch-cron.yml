# Triggers Treasury Agent via repository_dispatch every 5 minutes.
# Uses GITHUB_TOKEN by default (no PAT required). Optional: TREASURY_TRIGGER_PAT.

name: Treasury Dispatch Cron

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Trigger treasury-tick
        env:
          PAT: ${{ secrets.TREASURY_TRIGGER_PAT }}
          GITHUB_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          TOKEN="${PAT:-$GITHUB_TOKEN}"
          code=$(curl -s -o /tmp/dispatch-body.txt -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${REPO}/dispatches" \
            -d '{"event_type":"treasury-tick"}')
          echo "dispatch HTTP $code"
          if [ "$code" != "204" ]; then
            cat /tmp/dispatch-body.txt
            exit 1
          fi