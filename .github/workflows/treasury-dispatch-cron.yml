# Triggers Treasury Agent every 5 minutes.
#
# GITHUB_TOKEN cannot call repository_dispatch (403 "Resource not accessible by integration").
# Use workflow_dispatch on treasury-agent.yml instead (works with actions: write).
# Optional secret TREASURY_TRIGGER_PAT still works if you prefer a PAT.

name: Treasury Dispatch Cron

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Trigger Treasury Agent
        env:
          PAT: ${{ secrets.TREASURY_TRIGGER_PAT }}
          GITHUB_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          # default branch is master on this repo
          REF: master
        run: |
          set -euo pipefail
          TOKEN="${PAT:-$GITHUB_TOKEN}"

          # Prefer workflow_dispatch — reliable with GITHUB_TOKEN + actions: write
          code=$(curl -s -o /tmp/wd-body.txt -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${REPO}/actions/workflows/treasury-agent.yml/dispatches" \
            -d "{\"ref\":\"${REF}\"}")
          echo "workflow_dispatch HTTP $code"
          if [ "$code" = "204" ]; then
            exit 0
          fi
          cat /tmp/wd-body.txt || true

          # Fallback: repository_dispatch only works with a PAT (repo / Actions write)
          if [ -n "${PAT}" ]; then
            code=$(curl -s -o /tmp/rd-body.txt -w "%{http_code}" -X POST \
              -H "Authorization: Bearer $PAT" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/${REPO}/dispatches" \
              -d '{"event_type":"treasury-tick"}')
            echo "repository_dispatch HTTP $code"
            if [ "$code" = "204" ]; then
              exit 0
            fi
            cat /tmp/rd-body.txt || true
          fi

          echo "Failed to trigger Treasury Agent"
          exit 1
