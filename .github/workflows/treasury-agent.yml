# Autonomous treasury agent — processes withdrawal + market-seed queues on testnet2.
# Secrets: TREASURY_MNEMONIC, SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY
# Optional: SPHERE_ORACLE_API_KEY, TREASURY_DEVICE_ID (else persisted in .treasury-data cache)
#
# Each run performs multiple passes (~90s apart) so one trigger clears more of the queue.
# Also triggered by cron-job.org → /api/treasury-tick (Vercel) or manual Run workflow.

name: Treasury Agent

on:
  schedule:
    - cron: '3,13,23,33,43,53 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [treasury-tick]

concurrency:
  group: treasury-agent
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  fulfill-withdrawals:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Restore treasury wallet cache
        uses: actions/cache@v4
        with:
          path: |
            .treasury-data
            .treasury-tokens
          key: treasury-sphere-${{ runner.os }}-v1
          restore-keys: treasury-sphere-${{ runner.os }}-

      - name: Log schedule metadata
        run: |
          echo "Run started: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "Event: ${{ github.event_name }}"
          echo "Commit: $(git rev-parse HEAD)"

      - name: Run treasury worker (18 passes — seeds, withdrawals, DMs, status)
        env:
          TREASURY_MNEMONIC: ${{ secrets.TREASURY_MNEMONIC }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SPHERE_ORACLE_API_KEY: ${{ secrets.SPHERE_ORACLE_API_KEY }}
          TREASURY_MAX_PASSES: '18'
          TREASURY_POLL_MS: '45000'
          TREASURY_CONSOLIDATE_ENABLED: 'false'
          TREASURY_FAUCET_ENABLED: 'true'
          TREASURY_FAUCET_INTERVAL_MS: '3600000'
          TREASURY_FAUCET_MIN_BALANCE_UCT: '100'
          TREASURY_FAUCET_MINT_UCT: '100'
        run: npm run treasury:worker -- --loop