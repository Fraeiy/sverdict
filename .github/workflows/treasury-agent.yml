# Autonomous treasury agent — processes withdrawal queue on testnet2 (v2 wallet-api).
# Secrets: TREASURY_MNEMONIC, SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY
# Optional: SPHERE_ORACLE_API_KEY, TREASURY_DEVICE_ID (else persisted in .treasury-data cache)

name: Treasury Agent

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  fulfill-withdrawals:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Restore treasury wallet cache
        uses: actions/cache@v4
        with:
          path: |
            .treasury-data
            .treasury-tokens
          key: treasury-sphere-${{ runner.os }}-v1
          restore-keys: treasury-sphere-${{ runner.os }}-
      - name: Show commit (verify latest code)
        run: git rev-parse HEAD && head -n 80 backend/treasury-worker.mjs | tail -n 20
      - name: Run treasury worker
        env:
          TREASURY_MNEMONIC: ${{ secrets.TREASURY_MNEMONIC }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SPHERE_ORACLE_API_KEY: ${{ secrets.SPHERE_ORACLE_API_KEY }}
        run: |
          npm run treasury:worker
          npm run dm:worker