# Autonomous treasury agent — processes withdrawal + market-seed queues on testnet2.
# Secrets: TREASURY_MNEMONIC, SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY
# Optional: SPHERE_ORACLE_API_KEY, TREASURY_DEVICE_ID (else persisted in .treasury-data cache)
#
# GitHub schedule is BEST-EFFORT (often 60–120+ min between triggers).
# Use repository_dispatch (npm run treasury:trigger / cron-job.org) for ~10 min cadence.
# treasury-worker.mjs already runs DMs at the end of each pass — no separate dm step.

name: Treasury Agent

on:
  schedule:
    - cron: '3,13,23,33,43,53 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [treasury-tick]

concurrency:
  group: treasury-agent
  cancel-in-progress: true

jobs:
  fulfill-withdrawals:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Restore treasury wallet cache
        uses: actions/cache@v4
        with:
          path: |
            .treasury-data
            .treasury-tokens
          key: treasury-sphere-${{ runner.os }}-v1
          restore-keys: treasury-sphere-${{ runner.os }}-

      - name: Log schedule metadata
        run: |
          echo "Run started: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "Event: ${{ github.event_name }}"
          echo "Commit: $(git rev-parse HEAD)"

      - name: Run treasury worker (seeds, withdrawals, DMs, status)
        env:
          TREASURY_MNEMONIC: ${{ secrets.TREASURY_MNEMONIC }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SPHERE_ORACLE_API_KEY: ${{ secrets.SPHERE_ORACLE_API_KEY }}
        run: npm run treasury:worker