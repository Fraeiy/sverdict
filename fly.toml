app = "sphere-predict"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  HOST = "0.0.0.0"
  PORT = "8787"
  # Point the backend at the mounted persistent volume for market data.
  # Without this (or a volume), created markets are lost on machine restarts
  # because Fly containers are ephemeral by default.
  DATA_DIR = "/data"

[mounts]
  source = "sphere_predict_data"
  destination = "/data"

[[services]]
  protocol = "tcp"
  internal_port = 8787
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1